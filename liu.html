    let currentPage = 1;

    let authToken = "";

    function openIntro() {
      window.open(INTRO_URL, "_blank");

    function getAuthElements() {
      return {
        usernameInput: document.getElementById("student-username"),
        passwordInput: document.getElementById("student-password"),
        authStatus: document.getElementById("authStatus"),
        registerBtn: document.getElementById("registerBtn"),
        loginBtn: document.getElementById("loginBtn"),
        logoutBtn: document.getElementById("logoutBtn")
      };
    }

    function setAuthStatus(message, isError = false) {
      const { authStatus } = getAuthElements();
      authStatus.textContent = message;
      authStatus.style.color = isError ? "#b00020" : "#222";
    }

    function updateAuthUI() {
      const { usernameInput, registerBtn, loginBtn, logoutBtn } = getAuthElements();
      const signedIn = !!authToken;

      registerBtn.style.display = signedIn ? "none" : "inline-block";
      loginBtn.style.display = signedIn ? "none" : "inline-block";
      logoutBtn.style.display = signedIn ? "inline-block" : "none";

      if (signedIn) {
        usernameInput.value = authUsername || "";
        setAuthStatus("Signed in as " + authUsername);
      } else {
        setAuthStatus("Not signed in");
      }
    }

    function saveSessionLocally(token, username) {
      authToken = token || "";
      authUsername = username || "";
      localStorage.setItem(SESSION_STORAGE.token, authToken);
      localStorage.setItem(SESSION_STORAGE.username, authUsername);
      updateAuthUI();
    }

    function clearSessionLocally() {
      authToken = "";
      authUsername = "";
      localStorage.removeItem(SESSION_STORAGE.token);
      localStorage.removeItem(SESSION_STORAGE.username);
      updateAuthUI();
    }

    function restoreSessionLocally() {
      authToken = localStorage.getItem(SESSION_STORAGE.token) || "";
      authUsername = localStorage.getItem(SESSION_STORAGE.username) || "";
      const { usernameInput } = getAuthElements();
      if (authUsername) usernameInput.value = authUsername;
      updateAuthUI();
    }

    async function apiFetch(path, options = {}) {
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {})
      };

      if (authToken) {
        headers.Authorization = "Bearer " + authToken;
      }

      const response = await fetch(WORKER_BASE_URL + path, {
        method: options.method || "GET",
        headers,
        body: options.body
      });

      const json = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(json.error || "Request failed");
      }

      return json;
    }

    function getInputSnapshot() {
      const snapshot = {};
      document.querySelectorAll("[data-savekey]").forEach(input => {
        snapshot[input.dataset.savekey] = input.value || "";
      });
      return snapshot;
    }

    function applyInputSnapshot(snapshot) {
      isApplyingRemoteData = true;
      document.querySelectorAll("[data-savekey]").forEach(input => {
        const key = input.dataset.savekey;
        input.value = snapshot && Object.prototype.hasOwnProperty.call(snapshot, key)
          ? (snapshot[key] ?? "")
          : "";
      });
      isApplyingRemoteData = false;
    }

    function buildProgressPayload() {
      return {
        playerName: authUsername,
        currentPage,
        solvedHubPages: Array.from(solvedHubPages),
        choiceTarget,
        page21ShownAlready,
        currentPdfUrl,
        inputValues: getInputSnapshot()
      };
    }

    function applyProgressPayload(progress) {
      if (!progress || typeof progress !== "object") return;

      applyInputSnapshot(progress.inputValues || {});
      currentPdfUrl = progress.currentPdfUrl || null;

      try {
        solvedHubPages = new Set(
          Array.isArray(progress.solvedHubPages)
            ? progress.solvedHubPages.map(Number).filter(n => SUB_PAGES.includes(n))
            : []
        );
      } catch (e) {
        solvedHubPages = new Set();
      }

      choiceTarget = progress.choiceTarget || "";
      page21ShownAlready = !!progress.page21ShownAlready;

      const pageToShow =
        Number(progress.currentPage) >= 1 && Number(progress.currentPage) <= 24
          ? Number(progress.currentPage)
          : 1;

      updateHubUI();
      showPage(pageToShow);
    }

    async function registerUser() {
      const { usernameInput, passwordInput } = getAuthElements();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        setAuthStatus("Enter username and password", true);
        return;
      }

      try {
        setAuthStatus("Registering...");
        const result = await apiFetch("/api/register", {
          method: "POST",
          body: JSON.stringify({ username, password, appId: APP_ID })
        });

        saveSessionLocally(result.token, result.username || username);
        passwordInput.value = "";

        if (result.saveData) {
          applyProgressPayload(result.saveData);
        }

        setAuthStatus("Account created.");
        queueAutoSave();
      } catch (err) {
        setAuthStatus(err.message || "Register failed", true);
      }
    }

    async function loginUser() {
      const { usernameInput, passwordInput } = getAuthElements();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        setAuthStatus("Enter username and password", true);
        return;
      }

      try {
        setAuthStatus("Logging in...");
        const result = await apiFetch("/api/login", {
          method: "POST",
          body: JSON.stringify({ username, password, appId: APP_ID })
        });

        saveSessionLocally(result.token, result.username || username);
        passwordInput.value = "";

        if (result.saveData) {
          applyProgressPayload(result.saveData);
        } else {
          await loadProgressFromServer();
        }

        setAuthStatus("Login successful.");
      } catch (err) {
        setAuthStatus(err.message || "Login failed", true);
      }
    }

    async function loadProgressFromServer() {
      if (!authToken) return;

      try {
const result = await apiFetch("/api/load?appId=" + encodeURIComponent(APP_ID), {
          method: "GET"
        });

        if (result.saveData) {
          applyProgressPayload(result.saveData);
        }

        if (result.username) {
          authUsername = result.username;
          localStorage.setItem(SESSION_STORAGE.username, authUsername);
        }

        setAuthStatus("Signed in as " + authUsername);
      } catch (err) {
        setAuthStatus(err.message || "Could not load progress", true);
      }
    }

    async function saveProgressToServer() {
      if (!authToken || saveInFlight) return;

      saveInFlight = true;

      try {
        await apiFetch("/api/save", {
          method: "POST",
          body: JSON.stringify({
            appId: APP_ID,
            saveData: buildProgressPayload()
          })
        });
        setAuthStatus("Saved for " + authUsername);
      } catch (err) {
        setAuthStatus(err.message || "Save failed", true);
      } finally {
        saveInFlight = false;
        if (saveQueued) {
          saveQueued = false;
          saveProgressToServer();
        }
      }
    }

    function queueAutoSave() {
      if (isApplyingRemoteData || !authToken) return;

      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => {
        if (saveInFlight) {
          saveQueued = true;
          return;
        }
        saveProgressToServer();
      }, 900);
    }


    function closeCustomPopup(value = null) {
      document.getElementById("customPopupOverlay").style.display = "none";
      document.getElementById("customPopupText").textContent = "";
      document.getElementById("customPopupButtons").innerHTML = "";
      return value;
    }

    function showCustomPopup(message, buttons = [{ text: "OK", value: true }], onClose = null) {
      const overlay = document.getElementById("customPopupOverlay");
      const textEl = document.getElementById("customPopupText");
      const buttonsEl = document.getElementById("customPopupButtons");

      textEl.textContent = message;
      buttonsEl.innerHTML = "";

      buttons.forEach(btn => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = btn.text;
        button.addEventListener("click", () => {
          closeCustomPopup(btn.value);
          if (onClose) onClose(btn.value);
        });
        buttonsEl.appendChild(button);
      });

      overlay.style.display = "flex";
    }

    function showMessagePopup(message) {
      showCustomPopup(message, [{ text: "OK", value: true }]);
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function playNextPageTransition(changePageFn) {
      const overlay = document.getElementById("pageTransitionOverlay");
      overlay.style.pointerEvents = "auto";
      overlay.style.opacity = "1";
      await wait(300);
      changePageFn();
      await wait(80);
      overlay.style.opacity = "0";
      await wait(300);
      overlay.style.pointerEvents = "none";
    }

    async function goToPageWithTransition(pageNum) {
      await playNextPageTransition(() => {
        showPage(pageNum);
      });
      queueAutoSave();
    }

    async function logoutUser() {
      clearTimeout(autoSaveTimer);

      try {
        if (authToken) {
          await apiFetch("/api/logout", {
            method: "POST",
            body: "{}"
          });
        }
      } catch (err) {
        console.error(err);
      }

      clearSessionLocally();

      const { passwordInput } = getAuthElements();
      passwordInput.value = "";
      setAuthStatus("Logged out");
    }

    function initCloudSaveInputs() {
      const inputs = document.querySelectorAll("[data-savekey]");
      inputs.forEach(input => {
        input.addEventListener("input", () => {
          queueAutoSave();
        });
      });
    }

    function loadHubStateDefault() {
      solvedHubPages = new Set();
      choiceTarget = "";
      page21ShownAlready = false;
    }

    function scalePage4Rect(rect) {
      return rect;
    }

    function buildPage4Hub() {
      const hubLayer = document.getElementById("page4-hub");
      const checkLayer = document.getElementById("page4-checkmarks");

      Object.entries(HUB_BOXES).forEach(([pageNumStr, rect]) => {
        const pageNum = Number(pageNumStr);
        const r = scalePage4Rect(rect);

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "hub-hotspot";
        btn.style.left = r.left + "px";
        btn.style.top = r.top + "px";
        btn.style.width = r.width + "px";
        btn.style.height = r.height + "px";
        btn.dataset.target = pageNum;
        btn.addEventListener("click", async () => {
          await goToPageWithTransition(pageNum);
        });
        hubLayer.appendChild(btn);

        if (pageNum >= 5 && pageNum <= 20) {
          const mark = document.createElement("div");
          mark.id = "checkmark-" + pageNum;
          mark.className = "checkmark";
          mark.textContent = "✅";
          mark.style.left = r.left + "px";
          mark.style.top = r.top + "px";
          mark.style.width = r.width + "px";
          mark.style.height = r.height + "px";
          checkLayer.appendChild(mark);
        }
      });

      document.getElementById("page4-next-overlay").addEventListener("click", () => {
        goToEndingFromHub(true);
      });
    }

    function updateHubUI() {
      SUB_PAGES.forEach(pageNum => {
        const mark = document.getElementById("checkmark-" + pageNum);
        if (mark) {
          mark.style.display = solvedHubPages.has(pageNum) ? "flex" : "none";
        }
      });

      const overlayBtn = document.getElementById("page4-next-overlay");
      overlayBtn.style.display = (currentPage === 4 && allHubSolved()) ? "flex" : "none";
    }

    function allHubSolved() {
      return SUB_PAGES.every(pageNum => solvedHubPages.has(pageNum));
    }

    function solvedHubCount() {
      return solvedHubPages.size;
    }

    function normalizeForContains(value, caseInsensitive) {
      return caseInsensitive ? value.toLowerCase() : value;
    }

    function validatePage3() {
      const top = (document.getElementById("page3-a1").value || "").trim();
      const mid = (document.getElementById("page3-a2").value || "").trim().toLowerCase();
      const bot = (document.getElementById("page3-a3").value || "").trim().toLowerCase();

      if (top === "" || mid === "" || bot === "") return false;

      const midOK =
        mid.includes("2") ||
        mid.includes("two") ||
        mid.includes("half");

      const botOK =
        bot.includes("2") ||
        bot.includes("two") ||
        bot.includes("half");

      return midOK && botOK;
    }

    function validateHubPage(pageNum) {
      const rule = HUB_RULES[pageNum];
      if (!rule) return false;

      const input = document.querySelector(rule.selector);
      if (!input) return false;

      const raw = (input.value || "").trim();
      if (raw === "") return false;

      const value = normalizeForContains(raw, rule.caseInsensitive);
      return rule.contains.every(item => {
        const needle = normalizeForContains(String(item), rule.caseInsensitive);
        return value.includes(needle);
      });
    }

    async function nextPage() {
      if (currentPage === 1) {
        await goToPageWithTransition(2);
        return;
      }

      if (currentPage === 2) {
        await goToPageWithTransition(3);
        return;
      }

      if (currentPage === 3) {
        if (!validatePage3()) {
          showMessagePopup("Please make sure all three answers are correct before moving on.");
          return;
        }
        await goToPageWithTransition(4);
        return;
      }

      if (currentPage === 4) {
        await goToEndingFromHub(true);
      }
    }

    async function goToEndingFromHub(useTransition = false) {
      if (!allHubSolved()) return;

      const destination = !choiceTarget ? 21 : Number(choiceTarget);

      if (useTransition) {
        await goToPageWithTransition(destination);
        return;
      }

      showPage(destination);
      queueAutoSave();
    }

    function prevPage() {
      if (currentPage === 2) {
        showPage(1);
        queueAutoSave();
        return;
      }

      if (currentPage === 3) {
        showPage(2);
        queueAutoSave();
        return;
      }

      if (currentPage === 4) {
        showPage(3);
        queueAutoSave();
        return;
      }

      if ([21,22,23,24].includes(currentPage)) {
        showPage(4);
        queueAutoSave();
      }
    }

    async function checkCurrentHubAnswer() {
      if (!SUB_PAGES.includes(currentPage)) return;

      const ok = validateHubPage(currentPage);

      if (!ok) {
        showMessagePopup("Oops. You need to try again or you will lose the chance to win the grand prize!");
        return;
      }

      const wasAlreadySolved = solvedHubPages.has(currentPage);
      solvedHubPages.add(currentPage);
      updateHubUI();
      queueAutoSave();

      const justReachedTen = !wasAlreadySolved && solvedHubCount() >= 10 && !page21ShownAlready;

      if (justReachedTen) {
        page21ShownAlready = true;
        queueAutoSave();
        await goToPageWithTransition(21);
        return;
      }

      await goToPageWithTransition(4);
    }

    function showPage(pageNum) {
      currentPage = pageNum;

      for (let i = 1; i <= 24; i++) {
        const page = document.getElementById("page" + i);
        if (page) page.classList.remove("active");
      }

      const target = document.getElementById("page" + pageNum);
      if (target) target.classList.add("active");

      updateHubUI();
      updateNavButtons();
      updateProgress();
    }

    function updateNavButtons() {
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const checkBtn = document.getElementById("check-btn");

      prevBtn.style.display = "none";
      nextBtn.style.display = "none";
      checkBtn.style.display = "none";

      if (currentPage === 1) {
        nextBtn.style.display = "inline-block";
        return;
      }

      if (currentPage === 2 || currentPage === 3) {
        prevBtn.style.display = "inline-block";
        nextBtn.style.display = "inline-block";
        return;
      }

      if (currentPage === 4) {
        prevBtn.style.display = "inline-block";
        nextBtn.style.display = allHubSolved() ? "inline-block" : "none";
        return;
      }

      if (SUB_PAGES.includes(currentPage)) {
        checkBtn.style.display = "inline-block";
        return;
      }

      if ([21,22,23,24].includes(currentPage)) {
        prevBtn.style.display = "inline-block";
      }
    }

    function updateProgress() {
      let baseSteps = 1;

      if (currentPage >= 2) baseSteps = 2;
      if (currentPage >= 3) baseSteps = 3;
      if (currentPage >= 4 || SUB_PAGES.includes(currentPage) || [21,22,23,24].includes(currentPage)) baseSteps = 4;

      const endingStep = [22,23].includes(currentPage) ? 1 : 0;
      const totalSteps = 21;
      const completedSteps = Math.min(baseSteps + solvedHubCount() + endingStep, totalSteps);
      const pct = (completedSteps / totalSteps) * 100;

      document.getElementById("progress").style.width = pct + "%";
      document.getElementById("progressText").innerText = pct.toFixed(0) + "% completed";
    }

    function initPage21Choices() {
      document.getElementById("page21-left-choice").addEventListener("click", () => {

      document.getElementById("page21-right-choice").addEventListener("click", () => {

      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }

    async function renderPdfIntoSecondCanvas(pdfUrl) {
      currentPdfUrl = pdfUrl;

      const roleContainer = document.getElementById("role-container");
      const viewer = document.getElementById("pdfViewer");
      const status = document.getElementById("pdfStatus");

      roleContainer.classList.add("pdf-mode");
      viewer.style.display = "block";
      viewer.innerHTML = "";
      viewer.scrollTop = 0;

      status.style.display = "block";
      status.textContent = "Loading PDF...";

      try {
        const loadingTask = pdfjsLib.getDocument({ url: pdfUrl });
        const pdf = await loadingTask.promise;

        status.textContent = "Rendering pages...";

        const targetWidth = 920;
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const viewport1 = page.getViewport({ scale: 1 });
          const scale = targetWidth / viewport1.width;
          const viewport = page.getViewport({ scale });

          const c = document.createElement("canvas");
          c.className = "pdfPageCanvas";
          c.width = Math.floor(viewport.width);
          c.height = Math.floor(viewport.height);

          const ctx = c.getContext("2d", { alpha: false });
          viewer.appendChild(c);

          await page.render({ canvasContext: ctx, viewport }).promise;
        }

        status.style.display = "none";
        queueAutoSave();
      } catch (err) {
        console.error("PDF.js render error:", err);
        status.textContent = "Failed to load PDF (see Console).";
      }
    }

    function initTranslationScreenshotTool() {
      document.getElementById("select-text").addEventListener("click", function () {
        const overlay = document.createElement("div");
        overlay.id = "selection-overlay";
        document.body.appendChild(overlay);

        let startX, startY, selectionBox;

        overlay.addEventListener("mousedown", function (e) {
          startX = e.clientX;
          startY = e.clientY;

          selectionBox = document.createElement("div");
          selectionBox.id = "selection-box";
          selectionBox.style.left = startX + "px";
          selectionBox.style.top = startY + "px";
          selectionBox.style.width = "0px";
          selectionBox.style.height = "0px";
          overlay.appendChild(selectionBox);

          function mouseMoveHandler(e) {
            const currentX = e.clientX;
            const currentY = e.clientY;
            const rectLeft = Math.min(startX, currentX);
            const rectTop = Math.min(startY, currentY);
            const rectWidth = Math.abs(currentX - startX);
            const rectHeight = Math.abs(currentY - startY);

            selectionBox.style.left = rectLeft + "px";
            selectionBox.style.top = rectTop + "px";
            selectionBox.style.width = rectWidth + "px";
            selectionBox.style.height = rectHeight + "px";
          }

          function mouseUpHandler() {
            overlay.removeEventListener("mousemove", mouseMoveHandler);
            overlay.removeEventListener("mouseup", mouseUpHandler);

            const boxRect = selectionBox.getBoundingClientRect();
            document.body.removeChild(overlay);

            const target = document.getElementById("container");
            const targetRect = target.getBoundingClientRect();

            html2canvas(target, { useCORS: true, allowTaint: false }).then(canvas => {
              const scaleFactor = canvas.width / targetRect.width;
              const sx = (boxRect.left - targetRect.left) * scaleFactor;
              const sy = (boxRect.top - targetRect.top) * scaleFactor;
              const sWidth = boxRect.width * scaleFactor;
              const sHeight = boxRect.height * scaleFactor;

              const croppedCanvas = document.createElement("canvas");
              croppedCanvas.width = sWidth;
              croppedCanvas.height = sHeight;

              const ctx = croppedCanvas.getContext("2d");
              ctx.drawImage(canvas, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);

              croppedCanvas.toBlob(blob => {
                if (!blob) return;

                const item = new ClipboardItem({ "image/png": blob });
                navigator.clipboard.write([item]).then(() => {
                  showMessagePopup("Screenshot copied to clipboard.");
                }).catch(err => {
                  console.error("Failed to copy screenshot to clipboard", err);
                  showMessagePopup("Failed to copy screenshot to clipboard.");
                });
              });
            });
          }

          overlay.addEventListener("mousemove", mouseMoveHandler);
          overlay.addEventListener("mouseup", mouseUpHandler);
        });
      });
    }

let tutorialIndex = 0;

function showTutorial() {
  const alreadySeen = localStorage.getItem("gt10_tutorial_seen");
  if (alreadySeen === "yes") return;

  const overlay = document.getElementById("tutorialOverlay");
  const img = document.getElementById("tutorialImage");

  tutorialIndex = 0;
  img.src = TUTORIAL_IMAGES[tutorialIndex];
  overlay.style.display = "flex";
}

function nextTutorialSlide() {
  const overlay = document.getElementById("tutorialOverlay");
  const img = document.getElementById("tutorialImage");

  tutorialIndex++;

  if (tutorialIndex >= TUTORIAL_IMAGES.length) {
    overlay.style.display = "none";
    localStorage.setItem("gt10_tutorial_seen", "yes");
    return;
  }

  img.src = TUTORIAL_IMAGES[tutorialIndex];
}

function initTutorial() {
  const nextBtn = document.getElementById("tutorialNext");
  nextBtn.addEventListener("click", nextTutorialSlide);

  // preload images
  TUTORIAL_IMAGES.forEach(url => {
    const pre = new Image();
    pre.src = url;
  });

  showTutorial();
}
