    #student-username,#student-password {font-size:16px;padding:5px 8px;width:150px;box-sizing:border-box;}
    #registerBtn,#loginBtn,#logoutBtn,#introBtn,#openFileBtn,#prev-btn,#next-btn,#collapse-widget,#side-widget button:not(#collapse-widget) {font-family:"Love Ya Like A Sister", cursive;}
    #registerBtn,#loginBtn,#logoutBtn,#introBtn {font-size:22px;padding:6px 12px;cursor:pointer;background-color:lightblue;border:none;line-height:1;border-radius:6px;}
    #authStatus {font-size:15px;font-family:"Comic Sans MS", sans-serif;color:#222;min-width:150px;}
    #progressBar {flex:1;background:#ccc;height:20px;margin:0 10px 0 0;position:relative;}
    #progress {background:green;height:100%;width:0%;}
    #progressText {font-size:16px;white-space:nowrap;}
    #saveStatus {font-size:13px;color:#444;min-width:120px;text-align:right;}
    #main-area {width:100%;display:flex;justify-content:center;}
    #main-wrapper {position:relative;width:960px;}
    #container {position:relative;width:960px;height:540px;border:1px solid #ccc;background:white;overflow:hidden;}
    .page {position:absolute;top:0;left:0;width:960px;height:540px;display:none;}
    .page.active {display:block;}
    .textbox {position:absolute;background-color:rgba(255,255,224,0.7);border:1px solid black;font-family:"Comic Sans MS",sans-serif;font-size:20px;color:black;padding:2px 6px;box-sizing:border-box;z-index:30;}
    .drawingCanvas {position:absolute;left:0;top:0;z-index:10;cursor:crosshair;}
    .hotspot{position:absolute;z-index:9999;background:rgba(173,216,230,0.95);border:2px solid #000;border-radius:8px;color:#000;font-family:"Comic Sans MS",sans-serif;font-size:18px;}
    #nav-buttons {position:absolute;top:50%;left:-150px;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;z-index:3000;}
    button {font-family:"Comic Sans MS",sans-serif;font-size:20px;background-color:lightblue;border:none;padding:10px 20px;margin:0;cursor:pointer;}
    .invisible-choice{background:transparent !important;border:none !important;}
    #side-widget {position:fixed;top:20px;right:20px;width:200px;height:200px;background:#f9f9f9;border:1px solid #ccc;padding:10px;box-sizing:border-box;font-family:'Caveat',cursive;z-index:999;transition:all 0.25s ease;}
    #side-widget.collapsed {width:120px;height:24px;padding:0;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(249,249,249,0.95);border:1px solid #ccc;font-family:"Comic Sans MS",sans-serif;font-size:8px;line-height:1;white-space:nowrap;}
    #side-widget.collapsed * {display:none !important;}
    #side-widget.collapsed::after {content:"Translation";}
    #collapse-widget {position:absolute;top:6px;right:6px;width:22px;height:22px;padding:0;line-height:1;font-size:14px;background:lightblue;border:none;border-radius:6px;cursor:pointer;font-family:"Comic Sans MS",sans-serif;}
    #side-widget p.title {font-size:24px;text-align:center;margin:0 0 10px;}
    #side-widget button:not(#collapse-widget) {display:block;margin:0 auto;font-size:20px;cursor:pointer;text-align:center;background:lightblue;border:none;padding:10px;font-family:"Comic Sans MS",sans-serif;}
    #side-widget a {display:block;margin:0 auto;font-size:14px;cursor:pointer;text-align:center;background:lightblue;border:none;padding:6px;text-decoration:none;color:inherit;font-family:"Comic Sans MS",sans-serif;}
    #selection-overlay {position:fixed;top:0;left:0;width:100%;height:100%;cursor:crosshair;z-index:1000;}
    #selection-box {position:absolute;border:2px dashed red;background:rgba(0, 0, 0, 0.1);}
    #role-container {position:relative;width:960px;height:540px;border:1px solid #ccc;box-sizing:border-box;margin-top:10px;overflow:hidden;background:#fff;}
    #role-stage {position:absolute;top:0;left:0;width:1600px;height:900px;transform-origin:top left;transform:scale(0.6);background:url('https://daryeaye.github.io/geotopia/role.jpg') no-repeat center/cover;}
    .role-hotspot {position:absolute;background:rgba(255,0,0,0);border:none;padding:0;margin:0;cursor:pointer;}
    #pdfViewer {position:absolute;inset:0;display:none;overflow-y:auto;overflow-x:hidden;background:#fff;z-index:5;}
    .pdfPageCanvas {display:block;margin:12px auto;background:white;}
    #pdfStatus {position:absolute;top:10px;left:10px;font-family:"Comic Sans MS",sans-serif;font-size:14px;color:#111;background:rgba(255,255,255,0.85);padding:6px 10px;border:1px solid rgba(0,0,0,0.15);border-radius:6px;z-index:10;display:none;}
    #role-container.pdf-mode #role-stage {display:none;}
    #openFileWrap {width:960px;text-align:center;margin-top:10px;}
    #openFileBtn {font-size:16px;padding:8px 16px;background:lightblue;border:none;cursor:pointer;border-radius:6px;line-height:1;}

    .animation-window {position:absolute;left:144px;top:8px;width:672px;height:418px;overflow:hidden;background:#fff;}
    .animation-window iframe {position:absolute;left:2px;top:0;width:800px;height:500px;border:none;transform:scale(0.836);transform-origin:top left;}
    #customPopupOverlay {position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:11000;display:none;align-items:center;justify-content:center;}
    #customPopupBox {background:#fffdf7;padding:24px 28px;border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,0.35);min-width:320px;max-width:min(420px,88vw);text-align:center;border:3px solid #000;}

  <script>
const TUTORIAL_IMAGES = [
  "https://daryeaye.github.io/geotopia/t1.jpg",
  "https://daryeaye.github.io/geotopia/t2.jpg",
  "https://daryeaye.github.io/geotopia/t3.jpg"
];
    
    const APP_ID = 'powerfall-pt1';
    const WORKER_BASE_URL = 'https://geotopia-powerfall-auth-api.daryeaye.workers.dev';
    const SESSION_STORAGE_KEY = 'gt8_cloud_token';
    const INTRO_URL = 'https://youtu.be/F8paV80TGac';
    const ALERT_EMPTY = 'You must help Yuki before moving on.';
    const ALERT_WRONG = 'Check the mural and try again.';

    let currentPage = 1;
    const totalPages = 18;
    let branchLastPage = null;
    let maxSeqIndexVisited = 0;
    let currentPdfUrl = '';

    let authToken = '';
    let loggedInUsername = '';
    let saveTimer = null;
    let isApplyingRemoteData = false;
    const drawings = { draw4: [], draw6: [], draw8: [], draw11: [], draw12: [] };

    function openIntro() { window.open(INTRO_URL, '_blank'); }
    function setSaveStatus(text) { document.getElementById('saveStatus').textContent = text; }

    function getSequence() {
      if (branchLastPage === 15) return [1,2,3,4,5,'5ex',6,7,'7ex',8,9,10,11,12,13,14,15];
      if (branchLastPage === 16) return [1,2,3,4,5,'5ex',6,7,'7ex',8,9,10,11,12,13,14,16];
      return [1,2,3,4,5,'5ex',6,7,'7ex',8,9,10,11,12,13,14,15,16];
    }

    function requiresAnimationPrompt(pageId) { return ['5ex','7ex'].includes(pageId); }

    function normalizePageId(pageId) {
      if (pageId === '5ex' || pageId === '7ex') return pageId;
      const n = Number(pageId);
      return Number.isInteger(n) && n >= 1 && n <= 16 ? n : 1;
    }

    let customPopupResolver = null;

    function closeCustomPopup(result = null) {
      document.getElementById('customPopupOverlay').style.display = 'none';
      document.getElementById('customPopupText').textContent = '';
      document.getElementById('customPopupButtons').innerHTML = '';
      const resolver = customPopupResolver;
      customPopupResolver = null;
      if (resolver) resolver(result);
    }

    function showCustomPopup(message, buttons, resolver = null) {
      customPopupResolver = resolver;
      document.getElementById('customPopupText').textContent = message;
      const buttonWrap = document.getElementById('customPopupButtons');
      buttonWrap.innerHTML = '';

      buttons.forEach(btn => {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = btn.text;
        button.addEventListener('click', () => closeCustomPopup(btn.value));
        buttonWrap.appendChild(button);
      });

      document.getElementById('customPopupOverlay').style.display = 'flex';
    }

    function showMessagePopup(message) {
      showCustomPopup(message, [{ text: 'OK', value: true }]);
    }

    function askYesNoPopup(message) {
      return new Promise(resolve => {
        showCustomPopup(message, [
          { text: 'Yes', value: true },
          { text: 'No', value: false }
        ], resolve);
      });
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function playNextPageTransition(changePageFn) {
      const overlay = document.getElementById('pageTransitionOverlay');
      overlay.style.pointerEvents = 'auto';
      overlay.style.opacity = '1';
      await wait(300);
      changePageFn();
      await wait(80);
      overlay.style.opacity = '0';
      await wait(300);
      overlay.style.pointerEvents = 'none';
    }

    function requiresCheck(pageNum) { return [3,5,7,9,11,12,14].includes(pageNum); }

    function validatePage(pageNum) {
      switch (pageNum) {
        case 3: {
          const keys = ['side','height','half','base','bases','parallel'];
          const inputs = Array.from(document.querySelectorAll('#page3 input.textbox'));
          const vals = inputs.map(i => (i.value || '').trim());
          const allEmpty = vals.every(v => v === '');
          if (allEmpty) return { ok: false, reason: 'empty' };
          let correct = 0;
          for (let i = 0; i < Math.min(vals.length, keys.length); i++) if (vals[i].toLowerCase() === keys[i]) correct++;
          return (correct >= 4) ? { ok: true } : { ok: false, reason: 'wrong' };
        }
        case 5: {
          const v = ['p5-63','p5-72','p5-42','p5-112'].map(k => (document.querySelector(`input[data-savekey="${k}"]`)?.value || '').trim());
          if (v.every(s => s === '')) return { ok: false, reason: 'empty' };
          return (v[0].includes('63') && v[1].includes('72') && v[2].includes('42') && v[3].includes('112')) ? { ok: true } : { ok: false, reason: 'wrong' };
        }
        case 7: {
          const v = ['p7-40','p7-17.5','p7-30','p7-120'].map(k => (document.querySelector(`input[data-savekey="${k}"]`)?.value || '').trim());
          if (v.every(s => s === '')) return { ok: false, reason: 'empty' };
          return (v[0].includes('40') && v[1].includes('17.5') && v[2].includes('30') && v[3].includes('120')) ? { ok: true } : { ok: false, reason: 'wrong' };
        }
        case 9: {
          const v = ['p9-40.5','p9-30','p9-148','p9-50'].map(k => (document.querySelector(`input[data-savekey="${k}"]`)?.value || '').trim());
          if (v.every(s => s === '')) return { ok: false, reason: 'empty' };
          return (v[0].includes('40.5') && v[1].includes('30') && v[2].includes('148') && v[3].includes('50')) ? { ok: true } : { ok: false, reason: 'wrong' };
        }
        case 11: {
          const v = (document.querySelector('input[data-savekey="p11-141"]')?.value || '').trim();
          if (v === '') return { ok: false, reason: 'empty' };
          return v.includes('141') ? { ok: true } : { ok: false, reason: 'wrong' };
        }
        case 12: {
          const v = (document.querySelector('input[data-savekey="p12-138"]')?.value || '').trim();
          if (v === '') return { ok: false, reason: 'empty' };
          return v.includes('138') ? { ok: true } : { ok: false, reason: 'wrong' };
        }
        case 14: {
          const v = (document.querySelector('input[data-savekey="p14-114"]')?.value || '').trim();
          if (v === '') return { ok: false, reason: 'empty' };
          return v.includes('114') ? { ok: true } : { ok: false, reason: 'wrong' };
        }
      }
      return { ok: true };
    }

    async function nextPage() {
      if (requiresCheck(currentPage)) {
        const res = validatePage(currentPage);
        if (!res.ok) {
          showMessagePopup(res.reason === 'empty' ? ALERT_EMPTY : ALERT_WRONG);
          return;
        }
      }
      if (requiresAnimationPrompt(currentPage)) {
        const finished = await askYesNoPopup('Did you finish watching the animation?');
        if (!finished) return;
      }
      if (currentPage === 13 && !branchLastPage) {
        showMessagePopup('Choose one path on this page to continue.');
        return;
      }
      const seq = getSequence();
      const idx = seq.indexOf(currentPage);
      if (idx === -1 || idx >= seq.length - 1) return;
      await playNextPageTransition(() => {
        currentPage = seq[idx + 1];
        showPage(currentPage);
      });
    }

    function prevPage() {
      const seq = getSequence();
      const idx = seq.indexOf(currentPage);
      if (idx <= 0) return;
      currentPage = seq[idx - 1];
      showPage(currentPage);
    }

    function showPage(p) {
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      document.getElementById('page' + p).classList.add('active');
      const seq = getSequence();
      const idx = seq.indexOf(p);
      if (idx !== -1) maxSeqIndexVisited = Math.max(maxSeqIndexVisited, idx);
      document.getElementById('prev-btn').style.display = (idx <= 0) ? 'none' : 'inline-block';
      const isLast = (idx >= seq.length - 1);
      const lockOn13 = (p === 13 && !branchLastPage);
      document.getElementById('next-btn').style.display = (isLast || lockOn13) ? 'none' : 'inline-block';
      updateProgress();
      queueCloudSave();
    }

    function updateProgress() {
      const seq = getSequence();
      const totalSteps = seq.length;
      const completedSteps = Math.min(maxSeqIndexVisited + 1, totalSteps);
      const pct = (completedSteps / totalSteps) * 100;
      document.getElementById('progress').style.width = pct + '%';
      document.getElementById('progressText').innerText = pct.toFixed(0) + '% completed';
    }

    function redrawLines(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      (drawings[canvasId] || []).forEach(l => {
        ctx.beginPath();
        ctx.moveTo(l.startX, l.startY);
        ctx.lineTo(l.endX, l.endY);
        ctx.strokeStyle = 'red';
        ctx.lineWidth = 4;
        ctx.stroke();
      });
    }

    function initLineDrawing(canvasId, resetBtnId, maxLines = 4) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const resetBtn = document.getElementById(resetBtnId);
      let drawing = false, startX = 0, startY = 0;
      function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX - rect.left) * (canvas.width / rect.width), y: (e.clientY - rect.top) * (canvas.height / rect.height) };
      }
      function redraw(preview = null) {
        redrawLines(canvasId);
        if (preview) {
          ctx.beginPath(); ctx.moveTo(preview.startX, preview.startY); ctx.lineTo(preview.endX, preview.endY);
          ctx.strokeStyle = 'red'; ctx.lineWidth = 4; ctx.stroke();
        }
      }
      canvas.addEventListener('mousedown', e => {
        if ((drawings[canvasId] || []).length >= maxLines) return;
        const p = getMousePos(e); drawing = true; startX = p.x; startY = p.y;
      });
      canvas.addEventListener('mousemove', e => {
        if (!drawing) return; const p = getMousePos(e); redraw({ startX, startY, endX: p.x, endY: p.y });
      });
      canvas.addEventListener('mouseup', e => {
        if (!drawing) return; drawing = false; const p = getMousePos(e);
        drawings[canvasId].push({ startX, startY, endX: p.x, endY: p.y }); redrawLines(canvasId); queueCloudSave();
      });
      canvas.addEventListener('mouseleave', () => { if (drawing) { drawing = false; redrawLines(canvasId); } });
      resetBtn.addEventListener('click', () => { drawings[canvasId] = []; redrawLines(canvasId); queueCloudSave(); });
    }

    function initBranchButtons() {
      document.getElementById('choice-to-15').addEventListener('click', () => { branchLastPage = 15; currentPage = 14; showPage(currentPage); });
      document.getElementById('choice-to-16').addEventListener('click', () => { branchLastPage = 16; currentPage = 14; showPage(currentPage); });
    }

    function initYukiInputs() {
      [document.querySelector('#page15 input'), document.querySelector('#page16 input')].forEach(input => {
        if (!input) return;
        input.addEventListener('input', () => {
          const v = input.value.trim().toLowerCase();
          if (v === 'ki' && input.dataset.done !== '1') {
            input.dataset.done = '1';
            window.open('https://daryeaye.github.io/gt8/zedong.html', '_blank');
            input.value = '';
            queueCloudSave();
          }
        });
      });
    }

    function initPdfJs() {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    async function renderPdfIntoSecondCanvas(pdfUrl) {
      currentPdfUrl = pdfUrl; queueCloudSave();
      const roleContainer = document.getElementById('role-container');
      const viewer = document.getElementById('pdfViewer');
      const status = document.getElementById('pdfStatus');
      roleContainer.classList.add('pdf-mode'); viewer.style.display = 'block'; viewer.innerHTML = ''; viewer.scrollTop = 0;
      status.style.display = 'block'; status.textContent = 'Loading PDF...';
      try {
        const loadingTask = pdfjsLib.getDocument({ url: pdfUrl });
        const pdf = await loadingTask.promise; status.textContent = 'Rendering pages...';
        const targetWidth = 920;
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum); const viewport1 = page.getViewport({ scale: 1 });
          const scale = targetWidth / viewport1.width; const viewport = page.getViewport({ scale });
          const c = document.createElement('canvas'); c.className = 'pdfPageCanvas'; c.width = Math.floor(viewport.width); c.height = Math.floor(viewport.height);
          const ctx = c.getContext('2d', { alpha: false }); viewer.appendChild(c);
          await page.render({ canvasContext: ctx, viewport }).promise;
        }
        status.style.display = 'none';
      } catch (err) {
        console.error('PDF.js render error:', err); status.textContent = 'Failed to load PDF (see Console).';
      }
    }

    function initSecondCanvasHotspots() {
      document.getElementById('hotspot-officer').addEventListener('click', () => renderPdfIntoSecondCanvas('https://daryeaye.github.io/gt8/GT2%20Officer.pdf'));
      document.getElementById('hotspot-professor').addEventListener('click', () => renderPdfIntoSecondCanvas('https://daryeaye.github.io/gt8/GT2%20Professor.pdf'));
      document.getElementById('hotspot-hacker').addEventListener('click', () => renderPdfIntoSecondCanvas('https://daryeaye.github.io/gt8/GT2%20Hacker.pdf'));
      document.getElementById('hotspot-video').addEventListener('click', () => window.open('https://www.youtube.com/watch?v=Fj98o3aFfk8', '_blank'));
    }

    function collectInputValues() {
      const data = {};
      document.querySelectorAll('.cloud-input').forEach(el => { data[el.dataset.savekey || el.id] = el.value; });
      return data;
    }

    function applyInputValues(values) {
      const safe = values && typeof values === 'object' ? values : {};
      document.querySelectorAll('.cloud-input').forEach(el => {
        const key = el.dataset.savekey || el.id;
        el.value = Object.prototype.hasOwnProperty.call(safe, key) ? safe[key] : '';
      });
    }

    function buildProgressPayload() {
      return {
        playerName: loggedInUsername,
        currentPage,
        branchLastPage,
        maxSeqIndexVisited,
        currentPdfUrl,
        inputValues: collectInputValues(),
        drawings
      };
    }

    function applyProgressPayload(payload) {
      isApplyingRemoteData = true;
      const safe = payload && typeof payload === 'object' ? payload : {};
      branchLastPage = safe.branchLastPage === 15 || safe.branchLastPage === 16 ? safe.branchLastPage : null;
      maxSeqIndexVisited = Number.isInteger(Number(safe.maxSeqIndexVisited)) ? Number(safe.maxSeqIndexVisited) : 0;
      currentPdfUrl = String(safe.currentPdfUrl || '');
      applyInputValues(safe.inputValues || {});
      const incomingDrawings = safe.drawings && typeof safe.drawings === 'object' ? safe.drawings : {};
      ['draw4','draw6','draw8','draw11','draw12'].forEach(id => { drawings[id] = Array.isArray(incomingDrawings[id]) ? incomingDrawings[id] : []; redrawLines(id); });
      currentPage = normalizePageId(safe.currentPage);
      showPage(currentPage);
      isApplyingRemoteData = false;
    }

    async function apiFetch(path, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (authToken) headers.Authorization = 'Bearer ' + authToken;
      const response = await fetch(WORKER_BASE_URL + path, { ...options, headers });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) throw new Error(data.error || 'Request failed.');
      return data;
    }

    function queueCloudSave() {
      if (!authToken || isApplyingRemoteData) return;
      clearTimeout(saveTimer);
      setSaveStatus('Saving...');
      saveTimer = setTimeout(() => saveProgressToServer().catch(err => { console.error(err); setSaveStatus('Save failed'); }), 700);
    }

    async function saveProgressToServer() {
      await apiFetch('/api/save', { method: 'POST', body: JSON.stringify({ appId: APP_ID, saveData: buildProgressPayload() }) });
      setSaveStatus('Saved');
    }

    function getAuthElements() {
      return {
        usernameInput: document.getElementById('student-username'),
        passwordInput: document.getElementById('student-password'),
        registerBtn: document.getElementById('registerBtn'),
        loginBtn: document.getElementById('loginBtn'),
        logoutBtn: document.getElementById('logoutBtn'),
        authStatus: document.getElementById('authStatus')
      };
    }

    function setAuthStatus(message, isError = false) {
      const { authStatus } = getAuthElements();
      authStatus.textContent = message;
      authStatus.style.color = isError ? '#b00020' : '#222';
    }

    function updateAuthUI() {
      const { usernameInput, passwordInput, registerBtn, loginBtn, logoutBtn } = getAuthElements();
      const loggedIn = !!authToken;
      if (loggedIn) {
        usernameInput.value = loggedInUsername || usernameInput.value;
      }
      registerBtn.style.display = loggedIn ? 'none' : 'inline-block';
      loginBtn.style.display = loggedIn ? 'none' : 'inline-block';
      logoutBtn.style.display = loggedIn ? 'inline-block' : 'none';
      setAuthStatus(loggedIn ? ('Logged in as ' + (loggedInUsername || 'student')) : 'Not logged in', false);
    }

    function saveSessionLocally(token, username) {
      authToken = token || '';
      loggedInUsername = username || '';
      localStorage.setItem(SESSION_STORAGE_KEY, authToken);
      localStorage.setItem(SESSION_STORAGE_KEY + '_username', loggedInUsername);
      updateAuthUI();
    }

    function clearSessionLocally() {
      authToken = '';
      loggedInUsername = '';
      localStorage.removeItem(SESSION_STORAGE_KEY);
      localStorage.removeItem(SESSION_STORAGE_KEY + '_username');
      updateAuthUI();
    }

    function restoreSessionLocally() {
      authToken = localStorage.getItem(SESSION_STORAGE_KEY) || '';
      loggedInUsername = localStorage.getItem(SESSION_STORAGE_KEY + '_username') || '';
      const { usernameInput } = getAuthElements();
      if (loggedInUsername) usernameInput.value = loggedInUsername;
      updateAuthUI();
    }

    async function registerUser() {
      const { usernameInput, passwordInput } = getAuthElements();
      const username = usernameInput.value.trim().toLowerCase();
      const password = passwordInput.value;
      if (!username || !password) {
        setAuthStatus('Enter username and password', true);
        return;
      }
      setAuthStatus('Registering...');
      try {
        const result = await apiFetch('/api/register', { method: 'POST', body: JSON.stringify({ username, password, appId: APP_ID }) });
        saveSessionLocally(result.token, result.username || username);
        applyProgressPayload(result.saveData || {});
        passwordInput.value = '';
        setSaveStatus('Loaded');
      } catch (err) {
        setAuthStatus(err.message || 'Register failed', true);
      }
    }

    async function loginUser() {
      const { usernameInput, passwordInput } = getAuthElements();
      const username = usernameInput.value.trim().toLowerCase();
      const password = passwordInput.value;
      if (!username || !password) {
        setAuthStatus('Enter username and password', true);
        return;
      }
      setAuthStatus('Logging in...');
      try {
        const result = await apiFetch('/api/login', { method: 'POST', body: JSON.stringify({ username, password, appId: APP_ID }) });
        saveSessionLocally(result.token, result.username || username);
        applyProgressPayload(result.saveData || {});
        passwordInput.value = '';
        setSaveStatus('Loaded');
      } catch (err) {
        setAuthStatus(err.message || 'Login failed', true);
      }
    }

    async function loadProgressFromServer() {
      const result = await apiFetch('/api/load?appId=' + encodeURIComponent(APP_ID), { method: 'GET' });
      if (result.username) {
        loggedInUsername = result.username;
        localStorage.setItem(SESSION_STORAGE_KEY + '_username', loggedInUsername);
      }
      updateAuthUI();
      applyProgressPayload(result.saveData || {});
      setSaveStatus('Loaded');
    }

    async function logout() {
      try { if (authToken) await apiFetch('/api/logout', { method: 'POST', body: '{}' }); } catch (err) { console.error(err); }
      clearSessionLocally();
      getAuthElements().passwordInput.value = '';
      setSaveStatus('Logged out');
      showPage(1);
    }

    function initCloudInputs() {
      document.querySelectorAll('.cloud-input').forEach(el => {
        el.addEventListener('input', queueCloudSave);
        el.addEventListener('change', queueCloudSave);
      });
    }

    (function () {
      const widget = document.getElementById('side-widget');
      const collapseBtn = document.getElementById('collapse-widget');
      widget.addEventListener('click', function () { if (widget.classList.contains('collapsed')) widget.classList.remove('collapsed'); });
      collapseBtn.addEventListener('click', function (e) { e.stopPropagation(); widget.classList.add('collapsed'); });
    })();

let tutorialIndex = 0;

  const alreadySeen = localStorage.getItem("gt10_tutorial_seen");
  if (alreadySeen === "yes") return;

  const overlay = document.getElementById("tutorialOverlay");
  const img = document.getElementById("tutorialImage");

  tutorialIndex = 0;
  img.src = TUTORIAL_IMAGES[tutorialIndex];
  overlay.style.display = "flex";

  const overlay = document.getElementById("tutorialOverlay");
  const img = document.getElementById("tutorialImage");

  tutorialIndex++;

    overlay.style.display = "none";
    localStorage.setItem("gt10_tutorial_seen", "yes");
    return;

  img.src = TUTORIAL_IMAGES[tutorialIndex];

  TUTORIAL_IMAGES.forEach(url => {
    const pre = new Image();
    pre.src = url;
  });

  showTutorial();
}

            const boxRect = selectionBox.getBoundingClientRect(); document.body.removeChild(overlay);

            html2canvas(target, { useCORS: true, allowTaint: false }).then(canvas => {
              const scaleFactor = canvas.width / targetRect.width;
              const sx = (boxRect.left - targetRect.left) * scaleFactor, sy = (boxRect.top - targetRect.top) * scaleFactor;
              const sWidth = boxRect.width * scaleFactor, sHeight = boxRect.height * scaleFactor;
              const croppedCanvas = document.createElement('canvas'); croppedCanvas.width = sWidth; croppedCanvas.height = sHeight;
              const ctx = croppedCanvas.getContext('2d'); ctx.drawImage(canvas, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);
              croppedCanvas.toBlob(blob => { if (!blob) return; const item = new ClipboardItem({ 'image/png': blob }); navigator.clipboard.write([item]).then(() => showMessagePopup('Screenshot copied to clipboard.')).catch(err => { console.error(err); showMessagePopup('Failed to copy screenshot to clipboard.'); }); });
            });
          }
          overlay.addEventListener('mousemove', mouseMoveHandler); overlay.addEventListener('mouseup', mouseUpHandler);
        });
      });
      showPage(currentPage);
      if (authToken) {
        try { await loadProgressFromServer(); } catch (err) { console.error(err); clearSessionLocally(); }
      }
      initTutorial();
    });
  </script>
<div id="tutorialOverlay">
  <div id="tutorialBox">
    <img id="tutorialImage" src="" alt="Tutorial">
    <button id="tutorialNext" type="button" aria-label="Next tutorial slide">›</button>
  </div>
</div>
</body>
</html>
